name: Chromatic

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  statuses: write
  checks: write

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Permite a Chromatic publicar el check "UI Tests" / comentarios en el PR
          token: ${{ secrets.GITHUB_TOKEN }}
          exitZeroOnChanges: true

name: Chromatic

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  statuses: write
  checks: write

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        id: chromatic
        continue-on-error: true
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}
          repositorySlug: Raul-Marin/storybook-bonico
          # false = exit 1 si hay cambios sin aceptar (la Action default es true)
          exitZeroOnChanges: false

      # Workaround: la App Chromatic aún no publica UI Tests en este repo.
      # Cuando la App esté vinculada, este step se puede quitar.
      - name: Publish UI Tests status on GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_URL: ${{ steps.chromatic.outputs.buildUrl }}
          STORYBOOK_URL: ${{ steps.chromatic.outputs.storybookUrl }}
          CHANGE_COUNT: ${{ steps.chromatic.outputs.changeCount }}
          ERROR_COUNT: ${{ steps.chromatic.outputs.errorCount }}
          CHROMATIC_CODE: ${{ steps.chromatic.outputs.code }}
          CHROMATIC_OUTCOME: ${{ steps.chromatic.outcome }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          CHANGES="${CHANGE_COUNT:-0}"
          ERRORS="${ERROR_COUNT:-0}"
          CODE="${CHROMATIC_CODE:-1}"

          if [ "$ERRORS" -gt 0 ]; then
            STATE="failure"
            DESC="Chromatic: ${ERRORS} error(s)"
          elif [ "$CHROMATIC_OUTCOME" = "success" ] && [ "$CODE" = "0" ]; then
            STATE="success"
            DESC="Chromatic: passed"
          elif [ "$CHANGES" -gt 0 ]; then
            STATE="failure"
            DESC="Chromatic: ${CHANGES} change(s) need Accept"
          else
            STATE="failure"
            DESC="Chromatic: not passed (code ${CODE})"
          fi

          TARGET_URL="${BUILD_URL:-https://www.chromatic.com/}"

          gh api --method POST "repos/${{ github.repository }}/statuses/${SHA}" \
            -f state="$STATE" \
            -f target_url="$TARGET_URL" \
            -f description="$DESC" \
            -f context="UI Tests"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BODY=$(printf '%s\n' \
              '<!-- chromatic-ui-tests -->' \
              '## Chromatic UI Tests' \
              '' \
              "- **Status:** ${DESC}" \
              "- **Review:** ${TARGET_URL}" \
              "- **Storybook:** ${STORYBOOK_URL}" \
              '' \
              'Accept in Chromatic, then re-run this workflow (until the Chromatic GitHub App is linked).')
            EXISTING=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
              --jq '.[] | select(.body | contains("<!-- chromatic-ui-tests -->")) | .id' | head -1 || true)
            if [ -n "${EXISTING:-}" ]; then
              gh api --method PATCH "repos/${{ github.repository }}/issues/comments/${EXISTING}" -f body="$BODY" >/dev/null
            else
              gh api --method POST "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" -f body="$BODY" >/dev/null
            fi
          fi

          if [ "$STATE" != "success" ]; then
            echo "::error::$DESC — $TARGET_URL"
            exit 1
          fi
